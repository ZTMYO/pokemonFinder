<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Pokémon Finder</title>
    <link rel="icon" type="image/png" href="favicon.png" />
    <link rel="stylesheet" href="styles.css" />
</head>
<body>
    <div class="app-shell">
        <header class="app-header">
            <div class="header-left">
                <div class="logo">
                    <img src="favicon.png" alt="Pokémon Finder" class="logo-icon" />
                    <span>Pokémon Finder</span>
                </div>
                <div class="header-search">
                    <input id="search-input" class="input header-search-input" placeholder="搜索宝可梦（中文 / 拼音）" autocomplete="off" />
                    <div id="search-suggestions" class="search-suggestions"></div>
                </div>
            </div>
            <div class="header-actions">
                <button id="theme-toggle" class="icon-toggle" aria-label="切换明暗主题">
                    <!-- moon icon -->
                    <svg id="theme-icon-moon" class="theme-icon" xmlns="http://www.w3.org/2000/svg" width="24" height="24" viewBox="0 0 24 24">
                        <path fill="currentColor" d="M19.904 14.202a8.2 8.2 0 1 1-9.695-10.203 10 10 0 0 0-.009.403c0 5.38 4.336 9.748 9.704 9.8m.288-1.802-.192.002a8 8 0 0 1-7.636-10.394 10 10 0 0 0-1.896.11c-4.795.74-8.466 4.883-8.466 9.884 0 5.523 4.477 10 10 10 4.825 0 8.852-3.417 9.792-7.964.127-.61.197-1.242.207-1.888-.58.15-1.186.235-1.809.25"></path>
                    </svg>
                    <!-- sun icon -->
                    <svg id="theme-icon-sun" class="theme-icon" xmlns="http://www.w3.org/2000/svg" width="24" height="24" viewBox="0 0 24 24">
                        <path fill="currentColor" d="M11.998 16.2a4.2 4.2 0 1 1 0-8.4 4.2 4.2 0 0 1 0 8.4m0 1.8a6 6 0 1 0 0-12 6 6 0 0 0 0 12M11.998.1a.9.9 0 0 1 .9.9v2a.9.9 0 0 1-1.8 0V1a.9.9 0 0 1 .9-.9M3.583 3.585a.9.9 0 0 1 1.273 0L6.27 4.999a.9.9 0 0 1-1.273 1.273L3.583 4.858a.9.9 0 0 1 0-1.273m16.83 0a.9.9 0 0 1 0 1.273l-1.415 1.414A.9.9 0 0 1 17.725 5l1.414-1.414a.9.9 0 0 1 1.273 0M.097 12a.9.9 0 0 1 .9-.9h2a.9.9 0 0 1 0 1.8h-2a.9.9 0 0 1-.9-.9m20 0a.9.9 0 0 1 .9-.9h2a.9.9 0 0 1 0 1.8h-2a.9.9 0 0 1-.9-.9M6.27 17.727a.9.9 0 0 1 0 1.273l-1.414 1.414a.9.9 0 1 1-1.273-1.273l1.414-1.414a.9.9 0 0 1 1.273 0m11.455 0a.9.9 0 0 1 1.273 0l1.414 1.414a.9.9 0 1 1-1.273 1.273L17.725 19a.9.9 0 0 1 0-1.273M11.998 20.1a.9.9 0 0 1 .9.9v2a.9.9 0 0 1-1.8 0v-2a.9.9 0 0 1 .9-.9"></path>
                    </svg>
                </button>
                <button id="open-about" class="ghost-button">关于</button>
            </div>
        </header>

        <main class="app-main">
            <section class="panel panel-left" aria-label="颜色选择">
                <h1 class="panel-title">选择颜色</h1>
                <p class="panel-subtitle">最多 5 个颜色，用于匹配宝可梦主色调。</p>

                <div id="color-inputs" class="color-inputs"></div>

                <div class="color-actions">
                    <button id="add-color" class="primary-button">添加颜色</button>
                    <button id="clear-colors" class="ghost-button">清空</button>
                </div>

                <div class="match-options">
                    <label class="field">
                        <span class="field-label">匹配方式</span>
                        <select id="match-mode" class="select">
                            <option value="closest">最近颜色优先</option>
                            <option value="average">与平均色接近</option>
                            <option value="any">任一颜色匹配</option>
                        </select>
                    </label>
                    <label class="field">
                        <span class="field-label">结果数量上限</span>
                        <input id="result-limit" type="number" min="1" max="200" value="60" class="input" />
                    </label>
                </div>

                <div class="field-group">
                    <label class="field">
                        <span class="field-label">颜色严格度（数值越大越严格）</span>
                        <input id="strictness" type="range" min="0" max="100" value="60" class="range" />
                    </label>
                </div>

                <section class="panel-subsection" aria-label="筛选条件">
                    <h2 class="subsection-title">筛选条件</h2>

                    <div class="field-group">
                        <label class="field">
                            <span class="field-label">属性（可多选）</span>
                            <div id="filter-types" class="tag-multi-select"></div>
                        </label>
                    </div>

                    <div class="field-group field-inline">
                        <label class="field field-inline-item">
                            <span class="field-label">世代</span>
                            <select id="filter-generation" class="select">
                                <option value="">不限</option>
                            </select>
                        </label>
                        <label class="field field-inline-item">
                            <span class="field-label">体型（shape）</span>
                            <select id="filter-shape" class="select">
                                <option value="">不限</option>
                            </select>
                        </label>
                    </div>

                    <div class="field-group field-inline field-inline-flags">
                        <label class="checkbox">
                            <input type="checkbox" id="filter-mega" />
                            <span>只看超级进化 (Mega)</span>
                        </label>
                        <label class="checkbox">
                            <input type="checkbox" id="filter-gmax" />
                            <span>只看超极巨化 (G-Max)</span>
                        </label>
                    </div>
                </section>

                <button id="run-search" class="primary-button primary-button-full">开始匹配</button>
                <button id="reset-all" class="ghost-button primary-button-full">重置</button>
            </section>

            <section class="panel panel-right" aria-label="宝可梦结果列表">
                <div class="results-header">
                    <h2 class="panel-title">匹配结果</h2>
                    <div id="active-filters" class="active-filters"></div>
                </div>
                <div id="results" class="results-grid" aria-live="polite"></div>
            </section>
        </main>
    </div>

    <!-- 关于模态框 -->
    <div id="about-modal" class="modal" aria-hidden="true" role="dialog" aria-modal="true">
        <div class="modal-backdrop" data-dismiss="about-modal"></div>
        <div class="modal-dialog" role="document">
            <header class="modal-header">
                <h2 class="modal-title">关于 Pokémon Finder</h2>
                <button class="icon-button" data-dismiss="about-modal" aria-label="关闭">×</button>
            </header>
            <div class="modal-body">
                <p>Pokémon Finder 是一个支持“凭外貌找名字”和“凭名字看外貌”的宝可梦检索工具。</p>
                <p>你可以：在左侧选择最多 5 个颜色，并结合属性、世代、体型等筛选条件，找到配色和形象最接近的一批宝可梦；也可以在顶部输入名称 / 拼音，快速定位某只宝可梦并查看它的主色与外观。</p>
                <p>前端为纯静态页面，不依赖任何后端服务，所有计算在浏览器本地完成。宝可梦基础数据基于社区开源数据整理与增强，仅用于学习与交流。</p>
                <p class="about-author">作者 @ZTMYO</p>
            </div>
            <footer class="modal-footer">
                <button class="primary-button" data-dismiss="about-modal">关闭</button>
            </footer>
        </div>
    </div>

    <!-- 轻量提示条（代替 alert） -->
    <div id="toast" class="toast" aria-live="polite"></div>

    <script src="app.js"></script>
</body>
</html>
